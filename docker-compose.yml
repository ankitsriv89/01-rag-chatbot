# docker-compose.yml
# Single-container local dev that mirrors the Hugging Face Spaces deploy:
# one Uvicorn process serves Gradio UI at / and FastAPI at /api/v1/*, /docs, /health
# all on port 7860 (see app/main.py for the gr.mount_gradio_app call).
#
# For the legacy two-process workflow (FastAPI on 8000 + separate Gradio on 7860),
# run them outside Docker:
#   uvicorn app.main:app --port 8000
#   BACKEND_URL=http://localhost:8000 python frontend/app.py

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-chatbot
    ports:
      - "7860:7860"
    env_file:
      - .env
    volumes:
      # Persist vector store across container restarts
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:7860/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
